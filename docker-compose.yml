# Docker Compose configuration for WildSight.
# This file will evolve as services are introduced throughout development.

services:
  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    container_name: wildsight-backend

    env_file:
      - .env
    volumes:
      - ./backend:/app
      
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    container_name: wildsight-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  database:
    image: postgis/postgis:17-3.5
    container_name: wildsight-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    ports:
    - "5432:5432"
    # Make sure database does not disappear when container is restarted. 
    # This is where the database will be stored.
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes: 
  postgres_data: