# Docker Compose configuration for WildSight.
# Development environment

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: wildsight-backend

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: wildsight-frontend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      CHOKIDAR_USEPOLLING: "true"

    ports:
      - "3000:3000"

    depends_on:
      - backend

  database:
    image: postgis/postgis:17-3.5

    container_name: wildsight-db

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: